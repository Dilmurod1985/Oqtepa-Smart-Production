<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
  <title>Oqtepa Smart Production</title>
  <style>
    :root {
      --surface: #ffffff;
      --surface-muted: #edf3fb;
      --border: #dce6f5;
      --text: #20324f;
      --primary: #225fb7;
      --primary-soft: #dfeafb;
      --panel-top: #313c51;
      --success: #3da568;
      --success-dark: #1a2534;
      --danger: #d35454;
      --shadow: 0 16px 40px rgba(41, 68, 112, 0.12);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(173, 205, 255, 0.5), transparent 28%),
        linear-gradient(180deg, #f7faff 0%, #edf3fb 100%);
      color: var(--text);
      padding: 18px 10px 30px;
    }

    .app { width: min(1320px, 100%); margin: 0 auto; }
    .menu-title, .panel-title {
      text-align: center;
      margin: 0 0 18px;
      font-size: clamp(22px, 3vw, 34px);
      letter-spacing: 0.06em;
      color: #274879;
      font-weight: 900;
    }

    .menu {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
    }

    .tile {
      border: 0;
      border-radius: 22px;
      padding: 24px 18px;
      background: var(--surface);
      box-shadow: var(--shadow);
      color: var(--text);
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
    }

    .panel {
      display: none;
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid rgba(220, 230, 245, 0.8);
      border-radius: 34px;
      padding: 20px;
      box-shadow: var(--shadow);
    }

    .panel-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }

    .back-btn {
      width: 44px;
      height: 44px;
      border: 0;
      border-radius: 50%;
      background: var(--surface-muted);
      color: var(--text);
      font-size: 22px;
      cursor: pointer;
      box-shadow: inset 0 0 0 1px var(--border);
    }

    .panel-title {
      margin: 0;
      flex: 1;
      text-align: left;
      letter-spacing: 0.02em;
      font-size: clamp(20px, 2.4vw, 30px);
    }

    .stock-card {
      background: var(--panel-top);
      color: #fff;
      border-radius: 18px;
      padding: 18px 14px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }

    .stock-item { text-align: center; }
    .stock-item span {
      display: block;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.75);
      margin-bottom: 8px;
      font-weight: 700;
    }
    .stock-item b {
      color: #6fb3ff;
      font-size: clamp(26px, 4vw, 34px);
      line-height: 1;
      font-weight: 900;
    }

    .mode-selector {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      background: #e8eef8;
      border-radius: 18px;
      padding: 5px;
      margin-bottom: 20px;
    }

    .mode-btn {
      border: 0;
      border-radius: 14px;
      padding: 14px;
      font-size: 22px;
      font-weight: 800;
      color: #7b8ba8;
      background: transparent;
      cursor: pointer;
    }

    .mode-btn.active {
      background: var(--surface);
      color: var(--primary);
      box-shadow: 0 4px 10px rgba(72, 107, 163, 0.18);
    }

    .hidden { display: none !important; }
    .section { display: block; }
    .field-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    .field-grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
    .field { min-width: 0; }
    label {
      display: block;
      margin: 0 0 8px;
      color: #6981a6;
      font-size: 18px;
      font-weight: 800;
    }

    input, select {
      width: 100%;
      min-height: 52px;
      border: 2px solid var(--border);
      border-radius: 16px;
      background: var(--surface);
      padding: 13px 18px;
      font-size: 17px;
      color: var(--text);
      outline: none;
    }

    .readonly-field {
      min-height: 52px;
      display: flex;
      align-items: center;
      padding: 13px 18px;
      border-radius: 16px;
      background: var(--primary-soft);
      border: 1px solid #d2e2fb;
      font-size: 17px;
      color: #162e52;
    }

    .summary-bar {
      margin: 18px 0 16px;
      padding: 14px 18px;
      border-radius: 16px;
      background: #e6f3ff;
      color: var(--primary);
      text-align: center;
      font-size: clamp(24px, 2.8vw, 34px);
      font-weight: 900;
    }

    .status-banner {
      margin: 0 0 14px;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 800;
      display: none;
    }

    .status-banner.show {
      display: block;
    }

    .status-banner.success {
      background: #e7f8ee;
      color: #20724a;
      border: 1px solid #bfe6cd;
    }

    .status-banner.error {
      background: #fff0f0;
      color: #a53c3c;
      border: 1px solid #f0c5c5;
    }

    .btn-main, .btn-secondary, .btn-ghost, .btn-danger {
      width: 100%;
      border-radius: 16px;
      cursor: pointer;
      font-weight: 800;
    }

    .btn-main {
      min-height: 62px;
      border: 2px solid var(--success-dark);
      background: var(--success);
      color: #fff;
      font-size: clamp(24px, 2.7vw, 34px);
      text-transform: uppercase;
      box-shadow: 0 8px 18px rgba(61, 165, 104, 0.22);
    }

    .btn-secondary {
      min-height: 58px;
      border: 0;
      background: #2b6cb0;
      color: #fff;
      font-size: 18px;
      margin-top: 8px;
      padding: 14px 18px;
    }

    .btn-ghost {
      min-height: 48px;
      border: 2px dashed #b7c9e7;
      background: #f7fbff;
      color: var(--primary);
      font-size: 16px;
      padding: 10px 14px;
      margin-top: 10px;
    }

    .btn-danger {
      width: auto;
      min-height: 42px;
      padding: 9px 14px;
      border: 0;
      background: #ffe7e7;
      color: var(--danger);
      font-size: 14px;
    }

    .search-box { position: relative; }
    #workerList {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      z-index: 1000;
      max-height: 260px;
      overflow-y: auto;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 18px 36px rgba(41, 68, 112, 0.16);
    }

    .worker-opt {
      padding: 12px 14px;
      border-bottom: 1px solid #eef3fb;
      cursor: pointer;
      color: var(--text);
      font-size: 15px;
    }

    .worker-opt:hover { background: #f4f8ff; }

    .employee-form {
      margin-top: 12px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: #f8fbff;
    }

    .history-wrap {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid #e4ecf7;
    }

    .history-title {
      margin: 0 0 10px;
      color: #6c81a4;
      font-size: 17px;
      font-weight: 800;
    }

    #historyList { display: grid; gap: 10px; }
    .history-item {
      border-radius: 16px;
      background: linear-gradient(90deg, #f7fbff 0%, #fdfefe 100%);
      border-left: 5px solid var(--success);
      padding: 12px 16px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      min-height: 56px;
    }

    .history-main { min-width: 0; }
    .history-name {
      display: block;
      font-size: 16px;
      font-weight: 900;
      color: #152c4c;
      margin-bottom: 4px;
    }

    .history-sub { color: #7488a8; font-size: 15px; }
    .history-meta { color: #8da0bb; font-size: 13px; margin-top: 4px; }
    .history-side {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }

    .history-total {
      color: var(--primary);
      font-weight: 900;
      font-size: 16px;
      white-space: nowrap;
    }

    @media (max-width: 820px) {
      body { padding: 12px 8px 24px; }
      .panel { padding: 16px; border-radius: 24px; }
      .field-grid, .field-grid-3 { grid-template-columns: 1fr; }
      .mode-btn { font-size: 18px; padding: 12px; }
      label { font-size: 15px; }
      input, select, .readonly-field { font-size: 16px; min-height: 48px; }
      .btn-main { min-height: 56px; font-size: 20px; }
      .summary-bar { font-size: 22px; }
      .history-item, .history-side { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="app">
    <h1 id="menuTitle" class="menu-title">OQTEPA SMART</h1>

    <div id="mainMenu" class="menu">
      <button class="tile" onclick="openWS('ALLMAKON')">ALLMAKON</button>
      <button class="tile" onclick="openWS('OQTEPA')">OQTEPA</button>
      <button class="tile" onclick="openWS('CITY')">CITY</button>
      <button class="tile" onclick="openWS(`WENDY'S`)">WENDY'S</button>
      <button class="tile" onclick="openWS('MISSION')">MISSION</button>
      <button class="tile" onclick="openWS('TURK 70/30')">TURK 70/30</button>
    </div>

    <section id="panel" class="panel">
      <div class="panel-header">
        <button class="back-btn" onclick="goHome()" aria-label="Назад">←</button>
        <h2 id="wsTitle" class="panel-title"></h2>
      </div>

      <div id="statusBanner" class="status-banner"></div>

      <div class="stock-card">
        <div class="stock-item"><span>Лахм</span><b id="stL">0.0</b></div>
        <div class="stock-item"><span>Кийма</span><b id="stK">0.0</b></div>
        <div class="stock-item"><span>Думба</span><b id="stD">0.0</b></div>
      </div>

      <div class="mode-selector">
        <button id="mRaw" class="mode-btn active" onclick="setM('RAW')">Склад</button>
        <button id="mProd" class="mode-btn" onclick="setM('PROD')">Выпуск</button>
      </div>

      <div id="secRaw" class="section">
        <div class="field">
          <label for="rawType">Тип операции</label>
          <select id="rawType">
            <option value="Остаток утро">Остаток утро (замена)</option>
            <option value="Приход">Приход мяса (+)</option>
            <option value="Расход">Расход / брак (-)</option>
          </select>
        </div>

        <div class="field-grid-3">
          <div class="field"><label for="rL">Лахм</label><input id="rL" type="number" step="0.1" placeholder="0" /></div>
          <div class="field"><label for="rK">Кийма</label><input id="rK" type="number" step="0.1" placeholder="0" /></div>
          <div class="field"><label for="rD">Думба</label><input id="rD" type="number" step="0.1" placeholder="0" /></div>
        </div>

        <button class="btn-secondary" onclick="submitData('RAW')">Обновить склад</button>
      </div>

      <div id="secProd" class="section hidden">
        <div class="field">
          <label for="wSearch">Сотрудник</label>
          <div class="search-box">
            <input type="text" id="wSearch" placeholder="Имя или ID..." oninput="filterW()" autocomplete="off" />
            <div id="workerList" class="hidden"></div>
          </div>
          <input type="hidden" id="wId" />
          <button class="btn-ghost" type="button" onclick="toggleEmployeeForm()">+ Добавить нового сотрудника</button>
        </div>

        <div id="employeeForm" class="employee-form hidden">
          <div class="field-grid">
            <div class="field">
              <label for="newWorkerName">Имя сотрудника</label>
              <input id="newWorkerName" type="text" placeholder="Например: Karimov Sardor" />
            </div>
            <div class="field">
              <label for="newWorkerId">ID сотрудника</label>
              <input id="newWorkerId" type="text" placeholder="Например: 101" />
            </div>
          </div>
          <button class="btn-secondary" type="button" onclick="createEmployee()">Сохранить сотрудника</button>
        </div>

        <div class="field">
          <label>Выбранный сотрудник</label>
          <div id="workerDisplay" class="readonly-field">Не выбран</div>
        </div>

        <div class="field">
          <label for="pType">Продукт</label>
          <select id="pType" onchange="updTotal()">
            <option value="DONER 50/50">DONER 50/50</option>
            <option value="DONER 30/70">DONER 30/70</option>
            <option value="DONER 60/40">DONER 60/40</option>
            <option value="DONER 70/30">DONER 70/30</option>
            <option value="TURK 70/30">TURK 70/30</option>
            <option value="CITY 50/50">CITY 50/50</option>
            <option value="WENDY'S 50/50">WENDY'S 50/50</option>
            <option value="MISSION 100% QIYMA">MISSION 100% QIYMA</option>
          </select>
        </div>

        <div class="field-grid">
          <div class="field">
            <label for="pCal">Калибр донера (кг)</label>
            <input id="pCal" type="number" step="0.1" min="0" placeholder="Например: 5" oninput="updTotal()" />
          </div>
          <div class="field">
            <label for="pCount">Кол-во</label>
            <input id="pCount" type="number" min="1" placeholder="Например: 10" oninput="updTotal()" />
          </div>
        </div>

        <div id="totalTxt" class="summary-bar">Итого: 0 кг</div>

        <button class="btn-main" onclick="submitData('PROD')">ЗАФИКСИРОВАТЬ</button>
      </div>

      <div class="history-wrap">
        <h3 class="history-title">Последние действия</h3>
        <div id="historyList"></div>
      </div>
    </section>
  </div>

  <script>
    const BASE_EMPLOYEES = [
      { id: "57", name: "Alimov Murod" }, { id: "85", name: "Aliqulov Diyor" }, { id: "0.7", name: "Balqiboev Asadbek" },
      { id: "5", name: "Balqiboev Temur" }, { id: "76", name: "Boboqulov Ma'rufjon" }, { id: "77", name: "Botiraliyev Iskandar" },
      { id: "86", name: "Botirov Ulug'bek" }, { id: "74", name: "Hakimov Islom" }, { id: "41", name: "Ibragimov Ozodbek" },
      { id: "67", name: "Jonizaqov Xasanjon" }, { id: "3", name: "Jonizaqov Xusanjon" }, { id: "43", name: "Abdulxamidov Xasan" },
      { id: "11", name: "Adullo brigadir" }, { id: "44", name: "Ergashev Davronbek" }, { id: "71", name: "Ahmedov Ulug'bek" },
      { id: "8", name: "Aminov Shahboz" }, { id: "55", name: "Habibullayev Doniyor" }, { id: "64", name: "Keldibekov Muxammadkodir" },
      { id: "46", name: "Kuchkinov Abdulaziz" }, { id: "84", name: "Lapasov Javohir" }, { id: "88", name: "Miraliev Mirxasan" },
      { id: "14", name: "Miraliev Mirxusan" }, { id: "53", name: "Muxammadiev Abbos" }, { id: "52", name: "Nazarov Abdukodir" },
      { id: "49", name: "Nishonov Maxmudjon" }, { id: "6", name: "Normatov Avazbek" }, { id: "36", name: "O'ktamov Sardor" },
      { id: "24", name: "Ortiqboev Ma'rufjon" }, { id: "2", name: "Qo'chqorov Sardor" }, { id: "10", name: "Qo'shbokov Inomjon" },
      { id: "30", name: "Raimberdiyev Dilshod" }, { id: "37", name: "Rustamjonov Aziz" }, { id: "58", name: "Sattorov Ulug'bek" },
      { id: "35", name: "Shermatov Javlon" }, { id: "26", name: "To'xtamurodov Izzatilla" }, { id: "51", name: "Tugalov Sherzod" },
      { id: "73", name: "Vaxobjonov Avazbek" }, { id: "1", name: "Xalilov Nodirbek" }, { id: "27", name: "Xapizov Ozodbek" },
      { id: "39", name: "Xayrullaev Jasurbek" }, { id: "4", name: "Xoliqov Jumanazarbek" }, { id: "61", name: "Obidov Ziyodulla" },
      { id: "0.5", name: "Qayumova Dilnoza" }, { id: "staj-1", name: "Maxkamov Jahongir" }, { id: "staj-2", name: "Turg'unboyev Asadbek" }
    ];

    const RECIPES = {
      "DONER 50/50": { 5: { l: 2.4, k: 2.1, d: 0.5 }, 10: { l: 4.9, k: 4.1, d: 1 }, 20: { l: 9.8, k: 8.2, d: 2 }, 50: { l: 24.5, k: 20.5, d: 5 }, 60: { l: 29.4, k: 24.6, d: 6 } },
      "DONER 30/70": { 5: { l: 1.5, k: 3.2, d: 0.3 }, 10: { l: 3, k: 6.4, d: 0.6 }, 20: { l: 6, k: 12.8, d: 1.2 }, 50: { l: 15, k: 32, d: 3 }, 60: { l: 18, k: 38.4, d: 3.6 } },
      "DONER 60/40": { 5: { l: 2.8, k: 1.7, d: 0.5 }, 10: { l: 5.6, k: 3.4, d: 1 }, 20: { l: 11.2, k: 6.8, d: 2 }, 50: { l: 28, k: 17, d: 5 }, 60: { l: 33.6, k: 20.4, d: 6 } },
      "DONER 70/30": { 5: { l: 3.1, k: 1.3, d: 0.7 }, 10: { l: 6.2, k: 2.6, d: 1.4 }, 20: { l: 12.4, k: 5.2, d: 2.8 }, 50: { l: 31, k: 13, d: 7 }, 60: { l: 37.2, k: 15.6, d: 8.4 } },
      "TURK 70/30": { 10: { l: 5.83, k: 3.12, d: 2.2 }, 20: { l: 11.66, k: 6.24, d: 4.4 }, 30: { l: 16.59, k: 9.36, d: 6.6 }, 50: { l: 27.51, k: 14.7, d: 10.4 }, 60: { l: 33.18, k: 17.76, d: 12.6 } },
      "CITY 50/50": { 5: { l: 2.4, k: 2.1, d: 0.6 }, 10: { l: 4.8, k: 4.2, d: 1.2 }, 20: { l: 9.6, k: 8.4, d: 2.4 }, 50: { l: 23.5, k: 20.5, d: 6 } },
      "WENDY'S 50/50": { 5: { l: 2.4, k: 2.1, d: 0.5 }, 10: { l: 4.9, k: 4.1, d: 1 }, 20: { l: 9.8, k: 8.2, d: 2 }, 50: { l: 24.5, k: 20.5, d: 5 }, 60: { l: 29.4, k: 24.6, d: 6 } },
      "MISSION 100% QIYMA": { 50: { l: 0, k: 49, d: 1 } }
    };

    let employees = [...BASE_EMPLOYEES];
    let curWS = "";

    function showStatus(message, type = "success") {
      const banner = document.getElementById("statusBanner");
      banner.className = `status-banner show ${type}`;
      banner.textContent = message;
    }

    function setWorkerDisplay(text) {
      document.getElementById("workerDisplay").innerText = text || "Не выбран";
    }

    function mergeEmployees(serverEmployees) {
      const merged = [...BASE_EMPLOYEES];
      (serverEmployees || []).forEach((employee) => {
        if (!merged.some((item) => String(item.id) === String(employee.id))) {
          merged.push({ id: String(employee.id), name: employee.name });
        }
      });
      employees = merged;
    }

    async function loadEmployees() {
      try {
        const res = await fetch("/api/employees");
        const data = await res.json();
        mergeEmployees(data);
      } catch (_error) {
        employees = [...BASE_EMPLOYEES];
      }
    }

    async function openWS(name) {
      curWS = name;
      document.getElementById("menuTitle").classList.add("hidden");
      document.getElementById("mainMenu").classList.add("hidden");
      document.getElementById("panel").style.display = "block";
      document.getElementById("wsTitle").innerText = name;
      setWorkerDisplay("Не выбран");
      showStatus(`Открыт цех ${name}. Новые записи будут появляться в блоке "Последние действия".`);
      await Promise.all([refreshStock(), loadHistory(), loadEmployees()]);
      setM("PROD");
    }

    function goHome() {
      document.getElementById("menuTitle").classList.remove("hidden");
      document.getElementById("mainMenu").classList.remove("hidden");
      document.getElementById("panel").style.display = "none";
    }

    async function refreshStock() {
      try {
        const res = await fetch(`/api/get-stock/${encodeURIComponent(curWS)}`);
        const stock = await res.json();
        document.getElementById("stL").innerText = Number(stock.lahm || 0).toFixed(1);
        document.getElementById("stK").innerText = Number(stock.kiyma || 0).toFixed(1);
        document.getElementById("stD").innerText = Number(stock.dumba || 0).toFixed(1);
      } catch (_error) {
        document.getElementById("stL").innerText = "0.0";
        document.getElementById("stK").innerText = "0.0";
        document.getElementById("stD").innerText = "0.0";
      }
    }

    async function loadHistory() {
      const list = document.getElementById("historyList");
      list.innerHTML = "";

      try {
        const res = await fetch(`/api/history/${encodeURIComponent(curWS)}`);
        const items = await res.json();
        items.forEach((item) => renderHistoryItem(item, false));
      } catch (_error) {
        list.innerHTML = "";
      }
    }

    function setM(mode) {
      document.getElementById("secRaw").classList.toggle("hidden", mode !== "RAW");
      document.getElementById("secProd").classList.toggle("hidden", mode !== "PROD");
      document.getElementById("mRaw").classList.toggle("active", mode === "RAW");
      document.getElementById("mProd").classList.toggle("active", mode === "PROD");
    }

    function filterW() {
      const value = document.getElementById("wSearch").value.trim().toLowerCase();
      const list = document.getElementById("workerList");
      list.innerHTML = "";

      if (!value) {
        list.classList.add("hidden");
        return;
      }

      const filtered = employees.filter((employee) =>
        employee.name.toLowerCase().includes(value) || String(employee.id).toLowerCase().includes(value)
      ).slice(0, 12);

      if (!filtered.length) {
        list.classList.add("hidden");
        return;
      }

      list.classList.remove("hidden");
      filtered.forEach((employee) => {
        const option = document.createElement("div");
        option.className = "worker-opt";
        option.innerHTML = `<strong>${employee.name}</strong><br><span>ID: ${employee.id}</span>`;
        option.onclick = () => selectEmployee(employee);
        list.appendChild(option);
      });
    }

    function selectEmployee(employee) {
      document.getElementById("wSearch").value = employee.name;
      document.getElementById("wId").value = employee.id;
      setWorkerDisplay(`${employee.name} (ID: ${employee.id})`);
      document.getElementById("workerList").classList.add("hidden");
    }

    function toggleEmployeeForm() {
      document.getElementById("employeeForm").classList.toggle("hidden");
    }

    async function createEmployee() {
      const name = document.getElementById("newWorkerName").value.trim();
      const id = document.getElementById("newWorkerId").value.trim();

      if (!name || !id) {
        alert("Введите имя и ID сотрудника");
        return;
      }

      try {
        const res = await fetch("/api/employees", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, id })
        });

        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.error || "Не удалось добавить сотрудника");
        }

        mergeEmployees(data.employees);
        selectEmployee(data.employee);
        document.getElementById("newWorkerName").value = "";
        document.getElementById("newWorkerId").value = "";
        document.getElementById("employeeForm").classList.add("hidden");
        alert("Сотрудник добавлен");
      } catch (error) {
        alert(error.message || "Ошибка при добавлении сотрудника");
      }
    }

    function getRecipePerKg(product) {
      const recipeEntries = Object.entries(RECIPES[product] || {});
      if (!recipeEntries.length) return { l: 0, k: 0, d: 0 };

      const [weight, values] = recipeEntries[0];
      const kg = Number(weight || 1);
      return {
        l: Number(values.l || 0) / kg,
        k: Number(values.k || 0) / kg,
        d: Number(values.d || 0) / kg
      };
    }

    function updTotal() {
      const caliber = parseFloat(document.getElementById("pCal").value) || 0;
      const count = parseFloat(document.getElementById("pCount").value) || 0;
      const total = caliber * count;
      document.getElementById("totalTxt").innerText = `Итого: ${Number.isInteger(total) ? total : total.toFixed(1)} кг`;
    }

    function resetRawForm() {
      document.getElementById("rL").value = "";
      document.getElementById("rK").value = "";
      document.getElementById("rD").value = "";
    }

    function resetProdForm() {
      document.getElementById("wSearch").value = "";
      document.getElementById("wId").value = "";
      document.getElementById("pCal").value = "";
      document.getElementById("pCount").value = "";
      setWorkerDisplay("Не выбран");
      updTotal();
    }

    async function submitData(category) {
      const data = { workshop: curWS, category };

      if (category === "RAW") {
        data.type = document.getElementById("rawType").value;
        data.lahm = parseFloat(document.getElementById("rL").value) || 0;
        data.kiyma = parseFloat(document.getElementById("rK").value) || 0;
        data.dumba = parseFloat(document.getElementById("rD").value) || 0;
      } else {
        const workerId = document.getElementById("wId").value;
        if (!workerId) {
          alert("Выберите сотрудника");
          return;
        }

        const product = document.getElementById("pType").value;
        const caliber = parseFloat(document.getElementById("pCal").value) || 0;
        const count = parseFloat(document.getElementById("pCount").value) || 0;

        if (!caliber || !count) {
          alert("Введите калибр и количество");
          return;
        }

        const recipePerKg = getRecipePerKg(product);
        const totalKg = caliber * count;

        data.workerName = document.getElementById("wSearch").value;
        data.workerId = workerId;
        data.product = product;
        data.caliber = `${caliber} кг`;
        data.count = count;
        data.totalKg = Number(totalKg.toFixed(1));
        data.usage = {
          lahm: Number((recipePerKg.l * totalKg).toFixed(2)),
          kiyma: Number((recipePerKg.k * totalKg).toFixed(2)),
          dumba: Number((recipePerKg.d * totalKg).toFixed(2))
        };
      }

      try {
        const res = await fetch("/api/stock", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });

        const result = await res.json();
        if (!res.ok) {
          throw new Error(result.error || "Ошибка при отправке");
        }

        updateStockView(result.currentStock);

        if (result.entry) {
          renderHistoryItem(result.entry, true);
        } else {
          renderHistoryItem(buildLocalHistoryEntry(data), true);
        }

        if (category === "RAW") resetRawForm();
        if (category === "PROD") resetProdForm();

        showStatus("Успешно зафиксировано. Новая запись добавлена в блок 'Последние действия' ниже.", "success");
        document.querySelector(".history-wrap")?.scrollIntoView({ behavior: "smooth", block: "start" });
      } catch (error) {
        showStatus(error.message || "Ошибка при отправке", "error");
      }
    }

    function updateStockView(stock) {
      document.getElementById("stL").innerText = Number(stock.lahm || 0).toFixed(1);
      document.getElementById("stK").innerText = Number(stock.kiyma || 0).toFixed(1);
      document.getElementById("stD").innerText = Number(stock.dumba || 0).toFixed(1);
    }

    function buildLocalHistoryEntry(data) {
      return {
        id: `local_${Date.now()}`,
        category: data.category,
        workshop: data.workshop,
        timestamp: new Date().toISOString(),
        workerName: data.workerName || "",
        workerId: data.workerId || "",
        product: data.product || "",
        caliber: data.caliber || "",
        count: data.count || "",
        totalKg: data.totalKg || 0,
        type: data.type || "",
        lahm: data.lahm || 0,
        kiyma: data.kiyma || 0,
        dumba: data.dumba || 0
      };
    }

    function renderHistoryItem(data, prepend = true) {
      if (!data) return;

      const list = document.getElementById("historyList");
      const item = document.createElement("div");
      item.className = "history-item";
      const entryId = data.id || `temp_${Date.now()}`;
      item.dataset.entryId = entryId;

      const description = data.category === "PROD"
        ? `${data.product} (${data.caliber}) x ${data.count}`
        : `${data.type}: Лахм ${data.lahm || 0}, Кийма ${data.kiyma || 0}, Думба ${data.dumba || 0}`;

      const title = data.category === "PROD"
        ? (data.workerName || "Неизвестный сотрудник")
        : "Склад";

      const sideValue = data.category === "PROD"
        ? `${Number(data.totalKg || 0).toFixed(1)} кг`
        : new Date(data.timestamp).toLocaleTimeString("ru-RU", { hour: "2-digit", minute: "2-digit" });

      item.innerHTML = `
        <div class="history-main">
          <span class="history-name">${title}</span>
          <div class="history-sub">${description}</div>
          <div class="history-meta">ID операции: ${entryId}</div>
        </div>
        <div class="history-side">
          <div class="history-total">${sideValue}</div>
          <button class="btn-danger" type="button" onclick="undoEntry('${entryId}')" ${data.id ? "" : "disabled"}>Отменить</button>
        </div>
      `;

      if (prepend) {
        list.prepend(item);
      } else {
        list.appendChild(item);
      }

      while (list.children.length > 10) {
        list.removeChild(list.lastChild);
      }
    }

    async function undoEntry(entryId) {
      if (!confirm("Отменить эту операцию?")) return;

      try {
        const res = await fetch("/api/undo", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ entryId })
        });

        const result = await res.json();
        if (!res.ok) {
          throw new Error(result.error || "Не удалось отменить операцию");
        }

        updateStockView(result.currentStock);
        const node = document.querySelector(`[data-entry-id="${entryId}"]`);
        if (node) node.remove();
        showStatus("Операция отменена. Остатки обновлены.", "success");
      } catch (error) {
        showStatus(error.message || "Ошибка отмены", "error");
      }
    }

    document.addEventListener("click", (event) => {
      const searchBox = document.querySelector(".search-box");
      if (searchBox && !searchBox.contains(event.target)) {
        document.getElementById("workerList").classList.add("hidden");
      }
    });

    loadEmployees();
    updTotal();
  </script>
</body>
</html>
