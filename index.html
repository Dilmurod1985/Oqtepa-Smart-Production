<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oqtepa Meat System</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 15px; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-ws { background: #fff; border: 2px solid #007bff; color: #007bff; padding: 20px 10px; border-radius: 10px; font-weight: bold; cursor: pointer; text-align: center; }
        .btn-ws:active { background: #007bff; color: white; }
        .stock-display { display: flex; justify-content: space-around; background: #343a40; color: white; padding: 15px; border-radius: 10px; margin-top: 10px; }
        .stock-val { text-align: center; }
        .stock-val div { font-size: 12px; color: #adb5bd; }
        .stock-val b { font-size: 18px; color: #28a745; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .btn-send { width: 100%; background: #28a745; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 16px; margin-top: 10px; }
        .hidden { display: none; }
        .header { text-align: center; color: #1c2b46; margin-bottom: 20px; }
    </style>
</head>
<body>

<div id="wsMenu">
    <h2 class="header">ЦЕХ ПРОИЗВОДСТВА</h2>
    <div class="grid">
        <div class="btn-ws" onclick="selectWS('ALLMAKON')">ALLMAKON</div>
        <div class="btn-ws" onclick="selectWS('OQTEPA')">OQTEPA</div>
        <div class="btn-ws" onclick="selectWS('CITY')">CITY</div>
        <div class="btn-ws" onclick="selectWS('WENDYS')">WENDY'S</div>
        <div class="btn-ws" onclick="selectWS('TURK DONER')">TURK DONER</div>
        <div class="btn-ws" onclick="selectWS('MISSION')">MISSION</div>
    </div>
</div>

<div id="mainPanel" class="hidden">
    <button onclick="location.reload()" style="background:none; border:none; color:#007bff; font-weight:bold; cursor:pointer;">← НАЗАД</button>
    <h2 id="currentWS" style="text-align:center;"></h2>

    <div class="stock-display">
        <div class="stock-val"><div>ЛАХМ</div><b id="vL">0</b></div>
        <div class="stock-val"><div>КИЙМА</div><b id="vK">0</b></div>
        <div class="stock-val"><div>ДУМБА</div><b id="vD">0</b></div>
    </div>

    <div class="card">
        <select id="mode" onchange="toggleMode()">
            <option value="RAW">Склад (Приход/Расход)</option>
            <option value="PROD">Выпуск продукции (Списание)</option>
        </select>

        <div id="formRaw">
            <select id="rawType">
                <option value="Приход">Приход сырья (+)</option>
                <option value="Расход">Расход/Брак (-)</option>
                <option value="Остаток утро">Установка остатка (Утро)</option>
            </select>
            <input type="number" id="inL" placeholder="Лахм (кг)" step="0.1">
            <input type="number" id="inK" placeholder="Кийма (кг)" step="0.1">
            <input type="number" id="inD" placeholder="Думба (кг)" step="0.1">
        </div>

        <div id="formProd" class="hidden">
            <select id="pType">
                <option value="DONER 50/50">DONER 50/50</option>
                <option value="DONER 30/70">DONER 30/70</option>
                <option value="DONER 60/40">DONER 60/40</option>
                <option value="DONER 70/30">DONER 70/30</option>
                <option value="TURK DONER">TURK DONER</option>
                <option value="CITY 50/50">CITY 50/50</option>
                <option value="MISSIONFOODS">MISSIONFOODS</option>
                <option value="BURGER XOJAKBAR">BURGER XOJAKBAR</option>
            </select>
            <input type="number" id="pWeight" placeholder="Общий вес блоков (кг)" step="0.1">
        </div>

        <button class="btn-send" onclick="sendData()">ОБНОВИТЬ ДАННЫЕ</button>
    </div>
</div>

<script>
    const API_URL = 'https://oqtepa-smart-production.onrender.com'; // <--- ТВОЯ ССЫЛКА
    let selectedWS = '';

    async function selectWS(ws) {
        selectedWS = ws;
        document.getElementById('wsMenu').classList.add('hidden');
        document.getElementById('mainPanel').classList.remove('hidden');
        document.getElementById('currentWS').innerText = ws;
        updateUI();
    }

    function toggleMode() {
        const mode = document.getElementById('mode').value;
        document.getElementById('formRaw').classList.toggle('hidden', mode !== 'RAW');
        document.getElementById('formProd').classList.toggle('hidden', mode !== 'PROD');
    }

    async function updateUI() {
        const res = await fetch(`${API_URL}/api/get-stock/${selectedWS}`);
        const data = await res.json();
        document.getElementById('vL').innerText = data.lahm.toFixed(1);
        document.getElementById('vK').innerText = data.kiyma.toFixed(1);
        document.getElementById('vD').innerText = data.dumba.toFixed(1);
    }

    async function sendData() {
        const mode = document.getElementById('mode').value;
        let payload = { workshop: selectedWS, category: mode };

        if (mode === 'RAW') {
            payload.type = document.getElementById('rawType').value;
            payload.lahm = document.getElementById('inL').value;
            payload.kiyma = document.getElementById('inK').value;
            payload.dumba = document.getElementById('inD').value;
        } else {
            payload.product = document.getElementById('pType').value;
            payload.totalKg = document.getElementById('pWeight').value;
        }

        const res = await fetch(`${API_URL}/api/stock`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });

        if (res.ok) {
            alert('Успешно обновлено!');
            updateUI();
            document.querySelectorAll('input').forEach(i => i.value = '');
        }
    }
</script>

</body>
</html>
