services:
  - type: web
    name: oqtepa-smart-production
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: oqtepa-smart-production-db
          property: connectionString

databases:
  - name: oqtepa-smart-production-db
    plan: free
