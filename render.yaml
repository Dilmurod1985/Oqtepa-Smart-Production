services:
  - type: web
    name: oqtepa-smart-production
    env: node
    plan: free
    buildCommand: npm ci && npm run check
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: oqtepa-smart-production-db
          property: connectionString

databases:
  - name: oqtepa-smart-production-db
    plan: free
