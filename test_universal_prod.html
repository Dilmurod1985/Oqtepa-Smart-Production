<!DOCTYPE html>
<html>
<head>
    <title>Test Universal Fixation on Production</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        button { padding: 10px 20px; margin: 10px; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; }
        input { padding: 10px; margin: 5px; border: 1px solid #ccc; border-radius: 5px; }
        select { padding: 10px; margin: 5px; border: 1px solid #ccc; border-radius: 5px; }
        .result { margin: 20px 0; padding: 10px; background: #f5f5f5; border-radius: 5px; }
        .error { background: #ffebee; color: #d32f2f; }
        .success { background: #e8f5e8; color: #2e7d32; }
    </style>
</head>
<body>
    <h1>Test Universal Fixation on Production</h1>
    
    <h2>Employee Test</h2>
    <input type="text" id="employeeId" placeholder="Enter Employee ID" value="11">
    <button onclick="testEmployeeLookup()">Test Employee Lookup</button>
    <div id="employeeResult"></div>
    
    <h2>Universal Fixation Test</h2>
    <div>
        <label>Product:</label>
        <select id="productType">
            <option value="TURK 70/30">TURK 70/30</option>
            <option value="DONER 50/50">DONER 50/50</option>
            <option value="CITY 50/50">CITY 50/50</option>
        </select>
    </div>
    <div>
        <label>Caliber:</label>
        <input type="number" id="caliber" value="10" step="0.1">
    </div>
    <div>
        <label>Count:</label>
        <input type="number" id="count" value="10">
    </div>
    <div>
        <label>Firm:</label>
        <select id="firm">
            <option value="ALLMAKON">ALLMAKON</option>
            <option value="OQTEPA">OQTEPA</option>
            <option value="TURK">TURK</option>
        </select>
    </div>
    <button onclick="testUniversalFixation()">Test Universal Fixation</button>
    
    <div id="result"></div>
    
    <h2>Stock Check</h2>
    <button onclick="checkStock()">Check OQTEPA Stock</button>
    <button onclick="checkTURKStock()">Check TURK Stock</button>
    <div id="stockResult"></div>

    <script>
        async function testEmployeeLookup() {
            const employeeId = document.getElementById('employeeId').value;
            const resultDiv = document.getElementById('employeeResult');
            
            try {
                const response = await fetch('https://oqtepa-smart-production.onrender.com/api/employees');
                const employees = await response.json();
                
                const employee = employees.find(emp => emp.id === employeeId);
                
                if (employee) {
                    resultDiv.innerHTML = `<div class="result success">✅ Found: ${employee.name}</div>`;
                } else {
                    resultDiv.innerHTML = `<div class="result error">❌ Employee not found</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="result error">❌ Error: ${error.message}</div>`;
            }
        }
        
        async function testUniversalFixation() {
            const productType = document.getElementById('productType').value;
            const caliber = parseFloat(document.getElementById('caliber').value);
            const count = parseInt(document.getElementById('count').value);
            const firm = document.getElementById('firm').value;
            const employeeId = document.getElementById('employeeId').value;
            const resultDiv = document.getElementById('result');
            
            // Determine workshop
            const workshopMap = {
                'DONER 50/50': 'ALLMAKON',
                'DONER 30/70': 'ALLMAKON',
                'DONER 60/40': 'ALLMAKON',
                'DONER 70/30': 'ALLMAKON',
                'TURK 70/30': 'TURK',
                'CITY 50/50': 'CITY',
                "WENDY'S 50/50": 'WENDYS',
                'MISSION 100% QIYMA': 'MISSION'
            };
            
            const workshop = workshopMap[productType] || 'ALLMAKON';
            const totalKg = caliber * count;
            
            const data = {
                workshop: workshop,
                category: 'PROD',
                workerName: `ID: ${employeeId}`,
                workerId: employeeId,
                product: productType,
                firm: firm,
                caliber: caliber,
                count: count,
                totalKg: totalKg
            };
            
            resultDiv.innerHTML = `<div class="result">🔄 Testing: ${JSON.stringify(data, null, 2)}</div>`;
            
            try {
                const response = await fetch('https://oqtepa-smart-production.onrender.com/api/stock', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    resultDiv.innerHTML = `
                        <div class="result success">
                            ✅ SUCCESS!<br>
                            Workshop: ${workshop}<br>
                            Product: ${productType}<br>
                            Total: ${totalKg} kg<br>
                            <pre>${JSON.stringify(result, null, 2)}</pre>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="result error">
                            ❌ FAILED!<br>
                            Status: ${response.status}<br>
                            <pre>${JSON.stringify(result, null, 2)}</pre>
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="result error">❌ Error: ${error.message}</div>`;
            }
        }
        
        async function checkStock() {
            const resultDiv = document.getElementById('stockResult');
            
            try {
                const response = await fetch('https://oqtepa-smart-production.onrender.com/api/get-stock/OQTEPA');
                const stock = await response.json();
                
                resultDiv.innerHTML = `
                    <div class="result">
                        <h3>OQTEPA Stock:</h3>
                        <pre>${JSON.stringify(stock, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `<div class="result error">❌ Error: ${error.message}</div>`;
            }
        }
        
        async function checkTURKStock() {
            const resultDiv = document.getElementById('stockResult');
            
            try {
                const response = await fetch('https://oqtepa-smart-production.onrender.com/api/get-stock/TURK');
                const stock = await response.json();
                
                resultDiv.innerHTML = `
                    <div class="result">
                        <h3>TURK Stock:</h3>
                        <pre>${JSON.stringify(stock, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `<div class="result error">❌ Error: ${error.message}</div>`;
            }
        }
    </script>
</body>
</html>
